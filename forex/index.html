<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Backtester</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.7/dist/lightweight-charts.standalone.production.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">&#x1F4C8; FX Backtest</a>
  <div class="nav-links">
    <a href="index.html"   class="nav-link active">Chart</a>
    <a href="journal.html" class="nav-link">Journal</a>
    <a href="calendar.html" class="nav-link">Calendar</a>
  </div>
</nav>

<div class="layout">

  <aside class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Pair</div>
      <select id="pair">
        <option value="XAUUSD">XAU/USD &mdash; Gold</option>
        <option value="XAGUSD">XAG/USD &mdash; Silver</option>
        <option value="EURUSD">EUR/USD</option>
        <option value="GBPUSD">GBP/USD</option>
        <option value="USDJPY">USD/JPY</option>
        <option value="AUDUSD">AUD/USD</option>
        <option value="USDCAD">USD/CAD</option>
        <option value="USDCHF">USD/CHF</option>
        <option value="NZDUSD">NZD/USD</option>
        <option value="EURJPY">EUR/JPY</option>
        <option value="GBPJPY">GBP/JPY</option>
      </select>
    </div>

    <div class="sb-section">
      <div class="sb-label">Timeframe</div>
      <select id="timeframe">
        <option value="M15">M15</option>
        <option value="M30">M30</option>
        <option value="H1" selected>H1</option>
        <option value="H4">H4</option>
        <option value="D1">Daily</option>
        <option value="W1">Weekly</option>
      </select>
    </div>

    <div class="sb-section">
      <div class="sb-label">Start Date</div>
      <input type="date" id="startDate">
    </div>

    <div class="sb-section">
      <div class="sb-label">API Key</div>
      <input type="password" id="apiKey" placeholder="Paste key here">
      <a class="link" href="https://www.alphavantage.co/support/#api-key" target="_blank" rel="noopener">Get free key &rarr;</a>
    </div>

    <button class="btn btn-primary btn-full" id="btnLoad">Load Data</button>
    <button class="btn btn-outline btn-full btn-sm" id="btnClearCache">Clear Cache</button>
    <div id="statusMsg" class="status-msg"></div>
  </aside>

  <div class="main-area">
    <div class="chart-wrap" id="chartWrap">
      <div id="chart"></div>
    </div>

    <div class="bt-bar">
      <button class="btn-icon" id="btnSkipBack" title="Back 10">&laquo;&minus;10</button>
      <button class="btn-icon" id="btnBack"     title="Back 1">&minus;1</button>
      <button class="btn-icon" id="btnPlay"     title="Play / Pause">&#9654;</button>
      <button class="btn-icon" id="btnFwd"      title="Forward 1">+1</button>
      <button class="btn-icon" id="btnSkipFwd"  title="Forward 10">+10&raquo;</button>
      <select class="speed-sel" id="speed">
        <option value="800">Slow</option>
        <option value="400" selected>Normal</option>
        <option value="150">Fast</option>
        <option value="60">Turbo</option>
      </select>
      <a href="journal.html#log-trade" class="btn btn-outline btn-sm" style="margin-left:10px;text-decoration:none;">&#x1F4DD; Log Trade</a>
      <span class="bt-counter" id="candleCounter">No data &mdash; load a pair to start</span>
    </div>
  </div>

</div>

<script>
const DEFAULT_API_KEY = '68ac8b29f9554c4b847818aca921ee04';
let chart = null, candleSeries = null;
let candles = [], currentIdx = 0, playTimer = null;

document.addEventListener('DOMContentLoaded', () => {
  initChart();
  loadSaved();
  bindEvents();
});

function loadSaved() {
  const saved = Store.getApiKey() || DEFAULT_API_KEY;
  Store.setApiKey(saved);
  document.getElementById('apiKey').value = saved;
}

function initChart() {
  const wrap = document.getElementById('chartWrap');
  chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: { background: { color: '#0d1117' }, textColor: '#e6edf3' },
    grid:   { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d' },
    timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#3fb950', downColor: '#f85149',
    borderUpColor: '#3fb950', borderDownColor: '#f85149',
    wickUpColor: '#3fb950',   wickDownColor: '#f85149',
  });
  new ResizeObserver(() => {
    chart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
  }).observe(wrap);
}

function bindEvents() {
  document.getElementById('btnLoad')      .addEventListener('click', loadData);
  document.getElementById('btnClearCache').addEventListener('click', () => { Store.clearCache(); setStatus('success', 'Cache cleared.'); });
  document.getElementById('btnSkipBack')  .addEventListener('click', () => jump(-10));
  document.getElementById('btnBack')      .addEventListener('click', () => jump(-1));
  document.getElementById('btnPlay')      .addEventListener('click', togglePlay);
  document.getElementById('btnFwd')       .addEventListener('click', () => jump(1));
  document.getElementById('btnSkipFwd')   .addEventListener('click', () => jump(10));
}

async function loadData() {
  const apiKey = document.getElementById('apiKey').value.trim();
  Store.setApiKey(apiKey);
  const pair = document.getElementById('pair').value;
  const tf   = document.getElementById('timeframe').value;
  setStatus('info', '<span class="spinner"></span> Fetching data&hellip;');
  document.getElementById('btnLoad').disabled = true;
  try {
    candles = await API.fetchCandles(pair, tf, apiKey);
    const startDate = document.getElementById('startDate').value;
    if (startDate) {
      const isDayly = tf === 'D1' || tf === 'W1';
      const startTs = isDayly ? startDate : Math.floor(new Date(startDate + 'T00:00:00Z').getTime() / 1000);
      const idx = candles.findIndex(c => c.time >= startTs);
      currentIdx = idx > 0 ? Math.min(idx + 60, candles.length) : Math.min(60, candles.length);
    } else {
      currentIdx = Math.min(60, candles.length);
    }
    renderChart();
    setStatus('success', `&#10003; ${candles.length.toLocaleString()} candles &mdash; ${pair} ${tf}`);
  } catch (err) {
    setStatus('error', err.message);
  } finally {
    document.getElementById('btnLoad').disabled = false;
  }
}

function renderChart() {
  const visible = candles.slice(0, currentIdx);
  candleSeries.setData(visible);
  renderMarkers(visible);
  updateCounter();
}

function renderMarkers(visible) {
  if (!visible.length) return;
  const pair    = document.getElementById('pair').value;
  const isDayly = typeof visible[0].time === 'string';
  const trades  = Store.getTrades().filter(t => t.pair === pair);
  const markers = [];
  for (const t of trades) {
    let mTime;
    if (isDayly) {
      mTime = t.date;
      if (!visible.some(c => c.time === mTime)) continue;
    } else {
      const dayStart = Math.floor(new Date(t.date + 'T00:00:00Z').getTime() / 1000);
      const match = visible.find(c => c.time >= dayStart && c.time < dayStart + 86400);
      if (!match) continue;
      mTime = match.time;
    }
    markers.push({
      time:     mTime,
      position: t.direction === 'BUY' ? 'belowBar' : 'aboveBar',
      color:    t.direction === 'BUY' ? '#3fb950'  : '#f85149',
      shape:    t.direction === 'BUY' ? 'arrowUp'  : 'arrowDown',
      text:     `${t.direction} ${t.lots}L @${t.entry}`,
    });
  }
  if (markers.length) {
    markers.sort((a, b) => (a.time > b.time ? 1 : -1));
    candleSeries.setMarkers(markers);
  }
}

function updateCounter() {
  document.getElementById('candleCounter').textContent = candles.length
    ? `Candle ${currentIdx.toLocaleString()} / ${candles.length.toLocaleString()}`
    : 'No data — load a pair to start';
}

function jump(n) {
  if (!candles.length) return;
  const next = Math.max(1, Math.min(candles.length, currentIdx + n));
  if (next === currentIdx) return;
  currentIdx = next;
  if (next - currentIdx + next === next) {
    if (n === 1) { candleSeries.update(candles[currentIdx - 1]); updateCounter(); return; }
  }
  renderChart();
}

function togglePlay() {
  const btn = document.getElementById('btnPlay');
  if (playTimer) {
    clearInterval(playTimer); playTimer = null;
    btn.innerHTML = '&#9654;'; btn.classList.remove('playing'); return;
  }
  const ms = parseInt(document.getElementById('speed').value);
  btn.innerHTML = '&#9646;&#9646;'; btn.classList.add('playing');
  playTimer = setInterval(() => {
    if (currentIdx >= candles.length) {
      clearInterval(playTimer); playTimer = null;
      btn.innerHTML = '&#9654;'; btn.classList.remove('playing'); return;
    }
    currentIdx++;
    candleSeries.update(candles[currentIdx - 1]);
    updateCounter();
  }, ms);
}

function setStatus(type, html) {
  const el = document.getElementById('statusMsg');
  el.className = `status-msg show ${type}`;
  el.innerHTML = html;
}
</script>
</body>
</html>
